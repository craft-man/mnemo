  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nsection {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: 'Inter', sans-serif;\n  overflow: hidden;\n  box-sizing: border-box;\n  position: relative;\n}\n\n.frame {\n  position: absolute;\n  inset: 0;\n  padding: 110px 140px;\n  display: flex;\n  flex-direction: column;\n  box-sizing: border-box;\n  gap: 40px;\n}\n\n.row-between {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n}\n\n.two-col {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  column-gap: 100px;\n  align-items: center;\n  padding: 110px 140px;\n}\n\n.eyebrow {\n  font-size: 24px;\n  font-weight: 500;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-faint);\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  font-family: 'JetBrains Mono', monospace;\n}\n.eyebrow .dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--accent);\n}\n.eyebrow .num { color: var(--ink-faint); font-weight: 400; }\n\n/* ——— SLIDE 1: TITLE ——— */\n.s-title .frame { justify-content: space-between; padding: 90px 140px; }\n.s-title .wordmark {\n  display: flex; align-items: center; gap: 18px;\n  font-size: 28px; font-weight: 500; letter-spacing: -0.01em;\n}\n.s-title .glyph {\n  width: 40px; height: 40px; border-radius: 50%;\n  background: var(--accent);\n  position: relative;\n  box-shadow: inset 0 0 0 8px var(--bg), inset 0 0 0 14px var(--accent);\n}\n.s-title .meta {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px; color: var(--ink-faint);\n  text-align: right; line-height: 1.6;\n}\n.s-title .center { text-align: center; }\n.s-title .hero-word {\n  font-family: 'Inter', sans-serif;\n  font-size: 280px;\n  font-weight: 500;\n  letter-spacing: -0.06em;\n  line-height: 0.9;\n  margin: 0 0 36px 0;\n  color: var(--ink);\n}\n.s-title .hero-word .period { color: var(--accent); }\n.s-title .tagline {\n  font-family: 'Newsreader', serif;\n  font-style: italic;\n  font-weight: 300;\n  font-size: 56px;\n  color: var(--ink-soft);\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.s-title .tagline em { color: var(--accent); font-style: italic; }\n.s-title footer {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  color: var(--ink-faint);\n}\n\n/* ——— SLIDE 2: PROBLEM ——— */\n.s-problem .frame { justify-content: space-between; padding-top: 110px; padding-bottom: 110px; }\n.s-problem .stack { display: flex; flex-direction: column; gap: 56px; max-width: 1500px; }\n.s-problem .lead {\n  font-size: 100px;\n  font-weight: 500;\n  letter-spacing: -0.04em;\n  line-height: 1.02;\n  color: var(--ink);\n  margin: 0;\n}\n.s-problem .lead .dim { color: var(--ink-faint); }\n.s-problem .rows { display: flex; flex-direction: column; }\n.s-problem .row {\n  display: grid;\n  grid-template-columns: 60px 1fr;\n  gap: 32px;\n  align-items: baseline;\n  padding: 26px 0;\n  border-top: 1px solid var(--rule-soft);\n  font-size: 32px;\n  color: var(--ink-soft);\n  line-height: 1.35;\n}\n.s-problem .row:last-child { border-bottom: 1px solid var(--rule-soft); }\n.s-problem .row .step {\n  font-family: 'JetBrains Mono', monospace;\n  color: var(--ink-faint);\n  font-size: 24px;\n}\n.s-problem .row .verb { font-weight: 500; color: var(--ink); }\n\n/* ——— SLIDE 3: WIKI ——— */\n.s-wiki { background: var(--bg-warm); }\n.s-wiki .left { display: flex; flex-direction: column; gap: 48px; }\n.s-wiki h1 {\n  font-size: 108px;\n  font-weight: 500;\n  letter-spacing: -0.04em;\n  line-height: 0.98;\n  margin: 0;\n}\n.s-wiki h1 em {\n  font-family: 'Newsreader', serif;\n  font-style: italic;\n  font-weight: 300;\n  color: var(--accent);\n}\n.s-wiki .quote {\n  font-size: 30px;\n  line-height: 1.5;\n  color: var(--ink-soft);\n  max-width: 24ch;\n  margin: 0;\n}\n.s-wiki .visual {\n  position: relative;\n  aspect-ratio: 1;\n  width: 100%;\n  max-width: 640px;\n  margin-left: auto;\n}\n.s-wiki .visual svg { width: 100%; height: 100%; overflow: visible; }\n\n/* Graph animations */\n.s-wiki .halo {\n  transform-origin: 350px 350px;\n  animation: haloBreath 6s ease-in-out infinite;\n}\n@keyframes haloBreath {\n  0%, 100% { opacity: 0.7; transform: scale(1); }\n  50%      { opacity: 1; transform: scale(1.04); }\n}\n\n.s-wiki .center-dot {\n  transform-origin: 350px 350px;\n  animation: centerPulse 3.2s ease-in-out infinite;\n}\n@keyframes centerPulse {\n  0%, 100% { transform: scale(1); }\n  50%      { transform: scale(1.18); }\n}\n\n.s-wiki .center-ring {\n  transform-origin: 350px 350px;\n  animation: ringRipple 3.2s ease-out infinite;\n}\n.s-wiki .center-ring-2 {\n  animation-delay: 1.6s;\n}\n@keyframes ringRipple {\n  0%   { transform: scale(0.6); opacity: 0.45; }\n  100% { transform: scale(1.6); opacity: 0; }\n}\n\n/* Subtle floating per satellite */\n.s-wiki .sat, .s-wiki .sat-file {\n  animation: float 7s ease-in-out infinite;\n  transform-box: fill-box;\n  transform-origin: center;\n}\n.s-wiki .sat-1 { animation-delay: 0s;   animation-duration: 6.4s; }\n.s-wiki .sat-2 { animation-delay: 1.1s; animation-duration: 7.2s; }\n.s-wiki .sat-3 { animation-delay: 2.3s; animation-duration: 6.8s; }\n.s-wiki .sat-4 { animation-delay: 0.6s; animation-duration: 7.6s; }\n.s-wiki .sat-5 { animation-delay: 3.0s; animation-duration: 6.6s; }\n.s-wiki .sat-6 { animation-delay: 1.8s; animation-duration: 7.0s; }\n.s-wiki .sat-7 { animation-delay: 2.6s; animation-duration: 7.4s; }\n.s-wiki .sat-f1 { animation-delay: 0.4s; animation-duration: 5.4s; }\n.s-wiki .sat-f2 { animation-delay: 1.7s; animation-duration: 5.8s; }\n.s-wiki .sat-f3 { animation-delay: 2.9s; animation-duration: 5.6s; }\n.s-wiki .sat-f4 { animation-delay: 0.9s; animation-duration: 6.0s; }\n@keyframes float {\n  0%, 100% { transform: translate(0, 0); }\n  25%      { transform: translate(3px, -4px); }\n  50%      { transform: translate(-2px, -6px); }\n  75%      { transform: translate(-4px, 2px); }\n}\n\n/* Data pulses traveling along edges */\n.s-wiki .pulses line {\n  animation: pulseFlow 3.2s linear infinite;\n  animation-delay: var(--d, 0s);\n}\n@keyframes pulseFlow {\n  0%   { stroke-dashoffset: 260; opacity: 0; }\n  10%  { opacity: 0.7; }\n  90%  { opacity: 0.7; }\n  100% { stroke-dashoffset: 0;   opacity: 0; }\n}\n\n/* Slow gentle rotation of the whole graph */\n.s-wiki .orbit {\n  transform-origin: 350px 350px;\n  animation: orbitDrift 90s linear infinite;\n}\n@keyframes orbitDrift {\n  0%   { transform: rotate(0deg); }\n  100% { transform: rotate(360deg); }\n}\n/* Counter-rotate text labels so they stay readable */\n.s-wiki .sat text,\n.s-wiki .sat-file text {\n  animation: counterDrift 90s linear infinite;\n  transform-box: fill-box;\n  transform-origin: center;\n}\n@keyframes counterDrift {\n  0%   { transform: rotate(0deg); }\n  100% { transform: rotate(-360deg); }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  .s-wiki .halo,\n  .s-wiki .center-dot,\n  .s-wiki .center-ring,\n  .s-wiki .sat,\n  .s-wiki .sat-file,\n  .s-wiki .pulses line,\n  .s-wiki .orbit,\n  .s-wiki .sat text,\n  .s-wiki .sat-file text {\n    animation: none;\n  }\n}\n\n/* Apply vault style to wiki slide too */\n.s-wiki .vault {\n  background: var(--paper);\n  border-radius: 10px;\n  padding: 36px 40px;\n  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 30px 70px -24px rgba(0,0,0,0.18);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  line-height: 1.85;\n  color: var(--ink-soft);\n  max-width: 640px;\n  width: 100%;\n  margin-left: auto;\n  box-sizing: border-box;\n}\n.s-wiki .vault .file { color: var(--ink); }\n.s-wiki .vault .folder { color: var(--ink); font-weight: 500; }\n.s-wiki .vault .hint { color: var(--ink-faint); }\n.s-wiki .vault .acc { color: var(--accent); font-weight: 500; }\n.s-wiki .vault-head {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding-bottom: 16px;\n  margin-bottom: 14px;\n  border-bottom: 1px solid var(--rule-soft);\n  color: var(--ink-faint);\n  font-size: 24px;\n}\n.s-wiki .vault-head .dots { display: flex; gap: 6px; }\n.s-wiki .vault-head .dots span {\n  width: 11px; height: 11px; border-radius: 50%;\n  background: var(--rule);\n}\n.s-wiki .vault .row {\n  display: grid;\n  grid-template-columns: 200px 1fr;\n  gap: 24px;\n  padding-left: 22px;\n  align-items: baseline;\n}\n\n/* ——— SLIDE 4: MYTH ——— */\n.s-myth { background: #0e0f10; color: #f4f2ec; }\n.s-myth .frame { justify-content: space-between; }\n.s-myth .eyebrow { color: rgba(244,242,236,0.5); }\n.s-myth h1 {\n  font-family: 'Newsreader', serif;\n  font-weight: 300;\n  font-style: italic;\n  font-size: 220px;\n  letter-spacing: -0.04em;\n  line-height: 0.95;\n  margin: 0;\n  color: #f4f2ec;\n}\n.s-myth h1 .acc { color: var(--accent); font-style: italic; }\n.s-myth .pron {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 28px;\n  color: rgba(244,242,236,0.5);\n  margin-top: 32px;\n}\n.s-myth .pron span { color: #f4f2ec; }\n.s-myth .col-foot {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 100px;\n  align-items: end;\n}\n.s-myth .tagline {\n  font-size: 36px;\n  line-height: 1.45;\n  color: rgba(244,242,236,0.7);\n  max-width: 28ch;\n  font-weight: 300;\n  letter-spacing: -0.005em;\n  margin: 0;\n}\n.s-myth .tagline em {\n  font-family: 'Newsreader', serif;\n  font-style: italic;\n  color: #f4f2ec;\n  font-weight: 300;\n}\n\n/* ——— SLIDE 5: KARPATHY ——— */\n.s-karpathy .frame { justify-content: space-between; }\n.s-karpathy .quote-block { max-width: 1500px; }\n.s-karpathy .quote-mark {\n  font-family: 'Newsreader', serif;\n  font-size: 240px;\n  line-height: 0.5;\n  color: var(--accent);\n  height: 100px;\n  margin-bottom: 24px;\n}\n.s-karpathy .pull {\n  font-family: 'Newsreader', serif;\n  font-weight: 300;\n  font-size: 88px;\n  line-height: 1.1;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  margin: 0 0 64px 0;\n}\n.s-karpathy .pull em { font-style: italic; color: var(--accent); }\n.s-karpathy .attribution {\n  display: flex;\n  align-items: center;\n  gap: 24px;\n  font-size: 28px;\n  color: var(--ink-faint);\n  font-family: 'JetBrains Mono', monospace;\n}\n.s-karpathy .attribution .bar { width: 60px; height: 1px; background: var(--rule); }\n.s-karpathy .attribution strong { color: var(--ink); font-weight: 500; }\n\n/* ——— SLIDE 6: SKILLS ——— */\n.s-skills .frame { justify-content: flex-start; gap: 0; }\n.s-skills .head { margin-bottom: 80px; }\n.s-skills h1 {\n  font-size: 96px;\n  font-weight: 500;\n  letter-spacing: -0.04em;\n  line-height: 1;\n  margin: 28px 0 0 0;\n}\n.s-skills .grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  border-top: 1px solid var(--rule);\n}\n.s-skills .cell {\n  padding: 36px 40px 36px 0;\n  border-bottom: 1px solid var(--rule);\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n}\n.s-skills .cell:nth-child(3n+2),\n.s-skills .cell:nth-child(3n) {\n  padding-left: 40px;\n  border-left: 1px solid var(--rule);\n}\n.s-skills .cmd {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 28px;\n  font-weight: 500;\n  color: var(--ink);\n  letter-spacing: -0.01em;\n}\n.s-skills .cmd .slash { color: var(--accent); }\n.s-skills .desc {\n  font-size: 24px;\n  line-height: 1.4;\n  color: var(--ink-soft);\n}\n.s-skills .desc code {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  color: var(--ink);\n  background: var(--rule-soft);\n  padding: 1px 6px;\n  border-radius: 3px;\n}\n.s-skills .footnote {\n  margin-top: 56px;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  color: var(--ink-faint);\n}\n\n/* ——— SLIDE 7: OBSIDIAN ——— */\n.s-obsidian { background: var(--bg-warm); }\n.s-obsidian .left { display: flex; flex-direction: column; }\n.s-obsidian h1 {\n  font-size: 128px;\n  font-weight: 500;\n  letter-spacing: -0.045em;\n  line-height: 0.96;\n  margin: 36px 0 48px 0;\n}\n.s-obsidian h1 em {\n  font-family: 'Newsreader', serif;\n  font-style: italic;\n  font-weight: 300;\n  color: var(--accent);\n}\n.s-obsidian .body {\n  font-size: 30px;\n  line-height: 1.45;\n  color: var(--ink-soft);\n  max-width: 24ch;\n  margin: 0;\n}\n.s-obsidian .features {\n  margin-top: 48px;\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n}\n.s-obsidian .feat {\n  display: grid;\n  grid-template-columns: 28px 1fr;\n  gap: 18px;\n  align-items: baseline;\n  font-size: 24px;\n  color: var(--ink-soft);\n  line-height: 1.4;\n}\n.s-obsidian .feat .tick {\n  font-family: 'JetBrains Mono', monospace;\n  color: var(--accent);\n  font-size: 24px;\n}\n.s-obsidian .vault {\n  background: var(--paper);\n  border-radius: 10px;\n  padding: 36px 40px;\n  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 30px 70px -24px rgba(0,0,0,0.18);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  line-height: 1.7;\n  color: var(--ink-soft);\n  max-width: 620px;\n  margin-left: auto;\n  width: 100%;\n  box-sizing: border-box;\n}\n.s-obsidian .vault .file { color: var(--ink); }\n.s-obsidian .vault .folder { color: var(--ink); font-weight: 500; }\n.s-obsidian .vault .hint { color: var(--ink-faint); font-size: 24px; }\n.s-obsidian .vault .acc { color: var(--accent); font-weight: 500; }\n.s-obsidian .vault-head {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding-bottom: 16px;\n  margin-bottom: 14px;\n  border-bottom: 1px solid var(--rule-soft);\n  color: var(--ink-faint);\n  font-size: 24px;\n}\n.s-obsidian .vault-head .dots { display: flex; gap: 6px; }\n.s-obsidian .vault-head .dots span {\n  width: 11px; height: 11px; border-radius: 50%;\n  background: var(--rule);\n}\n\n/* ——— SLIDE 8: CTA ——— */\n.s-cta .frame { justify-content: space-between; padding: 90px 140px; }\n.s-cta .wordmark {\n  display: flex; align-items: center; gap: 18px;\n  font-size: 28px; font-weight: 500;\n}\n.s-cta .glyph {\n  width: 40px; height: 40px; border-radius: 50%;\n  background: var(--accent);\n  box-shadow: inset 0 0 0 8px var(--bg), inset 0 0 0 14px var(--accent);\n}\n.s-cta .meta {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  color: var(--ink-faint);\n}\n.s-cta h1 {\n  font-size: 168px;\n  font-weight: 500;\n  letter-spacing: -0.05em;\n  line-height: 0.92;\n  margin: 28px 0 0 0;\n}\n.s-cta h1 em {\n  font-family: 'Newsreader', serif;\n  font-style: italic;\n  font-weight: 300;\n  color: var(--accent);\n}\n.s-cta .commands {\n  display: flex;\n  flex-direction: column;\n  margin-top: 56px;\n  max-width: 1100px;\n}\n.s-cta .cmd-row {\n  display: grid;\n  grid-template-columns: 220px 1fr;\n  gap: 32px;\n  align-items: baseline;\n  padding: 22px 0;\n  border-top: 1px solid var(--rule-soft);\n}\n.s-cta .cmd-row:last-child { border-bottom: 1px solid var(--rule-soft); }\n.s-cta .cmd-row .label {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  color: var(--ink-faint);\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n}\n.s-cta .cmd-row .code {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 32px;\n  color: var(--ink);\n  font-weight: 500;\n}\n.s-cta .cmd-row .code .acc { color: var(--accent); }\n.s-cta footer {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 24px;\n  color: var(--ink-faint);\n}\n.s-cta footer .repo { color: var(--ink); font-weight: 500; }\n<\u002Fstyle>\n<script src=\"d8baf9d4-65de-41d5-9bde-e1080d2b07b1\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<deck-stage>\n\n  <!-- 1. TITLE -->\n  <section class=\"s-title\">\n    <div class=\"frame\">\n      <header class=\"row-between\">\n        <div class=\"wordmark\">\n          <span class=\"glyph\"><\u002Fspan>\n          <span class=\"brand\">Mnemo<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"meta\">Open source · MIT<br>github.com/craft-man/mnemo<\u002Fdiv>\n      <\u002Fheader>\n\n      <div class=\"center\">\n        <h1 class=\"hero-word\">Mnemo<span class=\"period\">.<\u002Fspan><\u002Fh1>\n        <p class=\"tagline\">Knowledge that <em>compounds<\u002Fem>.<\u002Fp>\n      <\u002Fdiv>\n\n      <footer class=\"row-between\">\n        <span>A persistent memory layer for AI agents<\u002Fspan>\n        <span>2025<\u002Fspan>\n      <\u002Ffooter>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2. PROBLEM -->\n  <section class=\"s-problem\">\n    <div class=\"frame\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">01<\u002Fspan><span>The problem<\u002Fspan><\u002Fdiv>\n\n      <div class=\"stack\">\n        <h1 class=\"lead\">\n          Every conversation,<br>\n          <span class=\"dim\">your AI starts<\u002Fspan> from zero<span class=\"dim\">.<\u002Fspan>\n        <\u002Fh1>\n\n        <div class=\"rows\">\n          <div class=\"row\">\n            <span class=\"step\">a<\u002Fspan>\n            <span><span class=\"verb\">You explain<\u002Fspan> the codebase, the conventions, the gotchas.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"row\">\n            <span class=\"step\">b<\u002Fspan>\n            <span><span class=\"verb\">It learns,<\u002Fspan> helps, then the session ends.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"row\">\n            <span class=\"step\">c<\u002Fspan>\n            <span><span class=\"verb\">Tomorrow,<\u002Fspan> you explain it all again.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3. WIKI NOT CACHE -->\n  <section class=\"s-wiki\">\n    <div class=\"two-col\">\n      <div class=\"left\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">02<\u002Fspan><span>The shift<\u002Fspan><\u002Fdiv>\n        <h1>\n          A wiki,<br>\n          not a <em>cache.<\u002Fem>\n        <\u002Fh1>\n        <p class=\"quote\">\n\n          Mnemo turns memory into Markdown (versioned, searchable, human-editable). Knowledge that survives the session and grows with the project.\n        \n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"visual\">\n        <svg viewBox=\"0 0 700 700\" aria-hidden=\"true\" class=\"graph\">\n          <defs>\n            <radialGradient id=\"halo\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n              <stop offset=\"0%\" stop-color=\"#1e5fa3\" stop-opacity=\"0.10\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#1e5fa3\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FradialGradient>\n          <\u002Fdefs>\n\n          <circle cx=\"350\" cy=\"350\" r=\"330\" fill=\"url(#halo)\" class=\"halo\"><\u002Fcircle>\n\n          <g class=\"orbit\">\n\n            <!-- main edges -->\n            <g class=\"edges\" stroke=\"#c8c4ba\" stroke-width=\"1\" fill=\"none\">\n              <line x1=\"350\" y1=\"350\" x2=\"160\" y2=\"170\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"540\" y2=\"160\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"610\" y2=\"330\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"560\" y2=\"540\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"360\" y2=\"600\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"140\" y2=\"540\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"90\" y2=\"360\"><\u002Fline>\n              <line x1=\"160\" y1=\"170\" x2=\"90\" y2=\"360\"><\u002Fline>\n              <line x1=\"540\" y1=\"160\" x2=\"610\" y2=\"330\"><\u002Fline>\n              <line x1=\"610\" y1=\"330\" x2=\"560\" y2=\"540\"><\u002Fline>\n              <line x1=\"560\" y1=\"540\" x2=\"360\" y2=\"600\"><\u002Fline>\n              <line x1=\"360\" y1=\"600\" x2=\"140\" y2=\"540\"><\u002Fline>\n              <line x1=\"140\" y1=\"540\" x2=\"90\" y2=\"360\"><\u002Fline>\n            <\u002Fg>\n\n            <!-- pulse edges (animated dashed overlay) -->\n            <g class=\"pulses\" stroke=\"#1e5fa3\" stroke-width=\"1.5\" fill=\"none\" opacity=\"0.55\">\n              <line x1=\"350\" y1=\"350\" x2=\"160\" y2=\"170\" stroke-dasharray=\"4 260\" style=\"--d:0s\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"540\" y2=\"160\" stroke-dasharray=\"4 260\" style=\"--d:1.4s\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"610\" y2=\"330\" stroke-dasharray=\"4 260\" style=\"--d:2.6s\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"560\" y2=\"540\" stroke-dasharray=\"4 260\" style=\"--d:0.8s\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"360\" y2=\"600\" stroke-dasharray=\"4 260\" style=\"--d:3.4s\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"140\" y2=\"540\" stroke-dasharray=\"4 260\" style=\"--d:2.0s\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"90\" y2=\"360\" stroke-dasharray=\"4 260\" style=\"--d:4.2s\"><\u002Fline>\n            <\u002Fg>\n\n            <!-- file edges -->\n            <g class=\"edges-faint\" stroke=\"#d9d6cf\" stroke-width=\"1\" fill=\"none\">\n              <line x1=\"350\" y1=\"350\" x2=\"260\" y2=\"100\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"450\" y2=\"100\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"640\" y2=\"450\"><\u002Fline>\n              <line x1=\"350\" y1=\"350\" x2=\"230\" y2=\"640\"><\u002Fline>\n            <\u002Fg>\n\n            <!-- center -->\n            <g class=\"center\">\n              <circle cx=\"350\" cy=\"350\" r=\"32\" fill=\"none\" stroke=\"#1e5fa3\" stroke-width=\"1\" opacity=\"0.35\" class=\"center-ring\"><\u002Fcircle>\n              <circle cx=\"350\" cy=\"350\" r=\"50\" fill=\"none\" stroke=\"#1e5fa3\" stroke-width=\"1\" opacity=\"0.18\" class=\"center-ring center-ring-2\"><\u002Fcircle>\n              <circle cx=\"350\" cy=\"350\" r=\"16\" fill=\"#1e5fa3\" class=\"center-dot\"><\u002Fcircle>\n            <\u002Fg>\n\n            <!-- folder satellites with floating animation -->\n            <g class=\"sat sat-1\">\n              <circle cx=\"160\" cy=\"170\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"160\" y=\"148\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">raw/<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat sat-2\">\n              <circle cx=\"540\" cy=\"160\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"540\" y=\"138\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">sources/<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat sat-3\">\n              <circle cx=\"610\" cy=\"330\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"628\" y=\"335\" text-anchor=\"start\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">entities/<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat sat-4\">\n              <circle cx=\"560\" cy=\"540\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"578\" y=\"568\" text-anchor=\"start\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">synthesis/<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat sat-5\">\n              <circle cx=\"360\" cy=\"600\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"360\" y=\"628\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">activity/<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat sat-6\">\n              <circle cx=\"140\" cy=\"540\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"140\" y=\"570\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">indexes/<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat sat-7\">\n              <circle cx=\"90\" cy=\"360\" r=\"9\" fill=\"#1e5fa3\"><\u002Fcircle>\n              <text x=\"72\" y=\"365\" text-anchor=\"end\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#16181a\">concepts/<\u002Ftext>\n            <\u002Fg>\n\n            <!-- file satellites -->\n            <g class=\"sat-file sat-f1\">\n              <circle cx=\"260\" cy=\"100\" r=\"5\" fill=\"#16181a\"><\u002Fcircle>\n              <text x=\"260\" y=\"82\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" fill=\"#8a8d92\">SESSION_BRIEF.md<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat-file sat-f2\">\n              <circle cx=\"450\" cy=\"100\" r=\"5\" fill=\"#16181a\"><\u002Fcircle>\n              <text x=\"450\" y=\"82\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" fill=\"#8a8d92\">SCHEMA.md<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat-file sat-f3\">\n              <circle cx=\"640\" cy=\"450\" r=\"5\" fill=\"#16181a\"><\u002Fcircle>\n              <text x=\"656\" y=\"455\" text-anchor=\"start\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" fill=\"#8a8d92\">log.md<\u002Ftext>\n            <\u002Fg>\n            <g class=\"sat-file sat-f4\">\n              <circle cx=\"230\" cy=\"640\" r=\"5\" fill=\"#16181a\"><\u002Fcircle>\n              <text x=\"230\" y=\"668\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" fill=\"#8a8d92\">config.json<\u002Ftext>\n            <\u002Fg>\n\n            <!-- center label (kept fixed, outside rotating orbit) -->\n          <\u002Fg>\n          <text x=\"350\" y=\"406\" text-anchor=\"middle\" font-family=\"JetBrains Mono, monospace\" font-size=\"24\" font-weight=\"500\" fill=\"#1e5fa3\">.mnemo/<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4. MNEMOSYNE -->\n  <section class=\"s-myth\">\n    <div class=\"frame\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">03<\u002Fspan><span>The name<\u002Fspan><\u002Fdiv>\n\n      <div>\n        <h1>Mnemosyne<span class=\"acc\">.<\u002Fspan><\u002Fh1>\n        <div class=\"pron\">/<span>nɪ·ˈmɑː·sɪ·ni<\u002Fspan>/ &nbsp;·&nbsp; Greek goddess of memory<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"col-foot\">\n        <p class=\"tagline\">\n          In myth, she is the mother of the Muses — <em>memory before creation.<\u002Fem>\n        <\u002Fp>\n        <p class=\"tagline\">\n          For an AI agent, memory is not storage. It is the <em>condition<\u002Fem> for thinking well.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5. KARPATHY -->\n  <section class=\"s-karpathy\">\n    <div class=\"frame\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">04<\u002Fspan><span>The pattern<\u002Fspan><\u002Fdiv>\n\n      <div class=\"quote-block\">\n        <div class=\"quote-mark\">“<\u002Fdiv>\n        <p class=\"pull\">\n          The most underrated tool for working with LLMs is a <em>well-maintained markdown file<\u002Fem> of context.\n        <\u002Fp>\n        <div class=\"attribution\">\n          <span class=\"bar\"><\u002Fspan>\n          <span>Inspired by <strong>Andrej Karpathy<\u002Fstrong> &nbsp;·&nbsp; on building with LLMs<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6. SKILLS -->\n  <section class=\"s-skills\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">05<\u002Fspan><span>The interface<\u002Fspan><\u002Fdiv>\n        <h1>Main skills.<br>One vocabulary.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"grid\">\n        <div class=\"cell\">\n          <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>mnemo:init<\u002Fdiv>\n          <div class=\"desc\">Bootstrap a project memory in <code>.mnemo/<\u002Fcode>  your wiki begins.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>mnemo:ingest<\u002Fdiv>\n          <div class=\"desc\">Processes all pending files from raw/ via LLM synthesis.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>mnemo:query<\u002Fdiv>\n          <div class=\"desc\">Searches the knowledge base.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>mnemo:save<\u002Fdiv>\n          <div class=\"desc\">Saves generated content (summaries, comparisons, analyses) as a permanent wiki page.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>mnemo:lint<\u002Fdiv>\n          <div class=\"desc\">Audits the knowledge base and proposes fixes.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>mnemo:mine<\u002Fdiv>\n          <div class=\"desc\">Scans the current session for knowledge worth persisting.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"footnote\">Works with Claude Code, Cursor, and any agent that speaks skills.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7. OBSIDIAN -->\n  <section class=\"s-obsidian\">\n    <div class=\"two-col\">\n      <div class=\"left\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">06<\u002Fspan><span>Native to your tools<\u002Fspan><\u002Fdiv>\n        <h1>Just <em>files.<\u002Fem><\u002Fh1>\n        <p class=\"body\">\n          Mnemo's memory is plain Markdown in a folder. Open it in Obsidian. Commit it to git if you want. Read it yourself.\n        <\u002Fp>\n        <div class=\"features\">\n          <div class=\"feat\"><span class=\"tick\">→<\u002Fspan><span>Backlinks, graph view, daily notes. All work natively.<\u002Fspan><\u002Fdiv>\n          <div class=\"feat\"><span class=\"tick\">→<\u002Fspan><span>Can be versioned with your repo. Diffable. Reviewable.<\u002Fspan><\u002Fdiv>\n          <div class=\"feat\"><span class=\"tick\">→<\u002Fspan><span>No vendor lock-in. No vector database. No magic.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"vault\">\n        <div class=\"vault-head\">\n          <div class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n          <span>my-project<\u002Fspan>\n        <\u002Fdiv>\n        <div><span class=\"folder\">▾ .mnemo/<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 22px;\"><span class=\"folder\">▾ my-project/<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"folder\">▸ raw/<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"folder\">▾ wiki/<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 66px;\"><span class=\"hint\">activity &nbsp; sources &nbsp; entities<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 66px;\"><span class=\"acc\">concepts<\u002Fspan> <span class=\"hint\">&nbsp; synthesis &nbsp; indexes<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"file\">index.md<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"file\">log.md<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"file\">SESSION_BRIEF.md<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"file\">SCHEMA.md<\u002Fspan><\u002Fdiv>\n        <div style=\"padding-left: 44px;\"><span class=\"file\">config.json<\u002Fspan> &nbsp; <span class=\"hint\">bm25 / qmd<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    \n  <\u002Fsection>\n\n  <!-- 8. CTA -->\n  <section class=\"s-cta\">\n    <div class=\"frame\">\n      <header class=\"row-between\">\n        <div class=\"wordmark\">\n          <span class=\"glyph\"><\u002Fspan>\n          <span>Mnemo<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"meta\">Available now<\u002Fdiv>\n      <\u002Fheader>\n\n      <div>\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span class=\"num\">07<\u002Fspan><span>Start remembering<\u002Fspan><\u002Fdiv>\n        <h1>Give your agent<br>a <em>memory.<\u002Fem><\u002Fh1>\n\n        <div class=\"commands\">\n          <div class=\"cmd-row\">\n            <span class=\"label\">Install<\u002Fspan>\n            <span class=\"code\"><span class=\"acc\">/<\u002Fspan>plugin marketplace add craft-man/mnemo<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cmd-row\">\n            <span class=\"label\">Initialize<\u002Fspan>\n            <span class=\"code\"><span class=\"acc\">/<\u002Fspan>mneno:init<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cmd-row\">\n            <span class=\"label\">Source<\u002Fspan>\n            <span class=\"code\">github.com/craft-man/<span class=\"acc\">mnemo<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <footer class=\"row-between\">\n        <span>Open source · MIT licensed<\u002Fspan>\n        <span class=\"repo\">Thank you.<\u002Fspan>\n      <\u002Ffooter>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
